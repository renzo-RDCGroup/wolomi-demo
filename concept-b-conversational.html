<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){if(sessionStorage.getItem('wlm_ok')==='1')return;var p=prompt('This demo is private. Enter password:');if(p==='Rocky'){sessionStorage.setItem('wlm_ok','1');return;}if(window.stop)window.stop();document.write('<!doctype html><meta charset=utf-8><body style="font-family:sans-serif;padding:48px;text-align:center;color:#1F3864;font-size:18px">This demo is private. Refresh to enter the password.</body>');document.close();})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat with a Mama Companion — Wolomi (Demo)</title>
<style>
  :root{--navy:#1F3864;--blue:#2E75B6;--pink:#D4537E;--pink-soft:#FBEAF0;--ink:#22303f;--muted:#5b6877;--bg:#eef2f8;--ok:#1D9E75}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased}
  .demo-flag{background:var(--navy);color:#fff;text-align:center;font-size:12px;padding:6px}
  .phone{max-width:440px;margin:0 auto;min-height:100vh;background:#fff;display:flex;flex-direction:column}
  .top{background:var(--navy);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:11px;position:sticky;top:0}
  .av{width:40px;height:40px;border-radius:50%;background:var(--pink);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px}
  .top .nm{font-weight:700;font-size:15px}
  .top .st{font-size:12px;opacity:.8;display:flex;align-items:center;gap:5px}
  .top .st::before{content:"";width:7px;height:7px;border-radius:50%;background:#5DCAA5;display:inline-block}
  .prog{display:flex;gap:5px;padding:12px 16px 4px}
  .pdot{height:5px;flex:1;background:#e6ecf3;border-radius:9px;transition:.4s}
  .pdot.on{background:var(--pink)}
  .chat{flex:1;padding:14px 16px;display:flex;flex-direction:column;gap:11px;overflow-y:auto}
  .row{display:flex;gap:9px;align-items:flex-end;max-width:88%;animation:pop .3s ease}
  @keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .bav{width:28px;height:28px;border-radius:50%;background:var(--pink);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700}
  .bub{background:#f1f4f9;border-radius:16px 16px 16px 4px;padding:11px 14px;font-size:15.5px;line-height:1.45;color:var(--ink)}
  .me{align-self:flex-end;flex-direction:row-reverse}
  .me .bub{background:var(--navy);color:#fff;border-radius:16px 16px 4px 16px}
  .typing .bub{display:flex;gap:4px;padding:14px}
  .typing span{width:7px;height:7px;background:#b7c1cf;border-radius:50%;animation:blink 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.3}30%{opacity:1}}
  .tray{padding:12px 16px 20px;border-top:1px solid #eef2f7;background:#fff}
  .opts{display:flex;flex-wrap:wrap;gap:8px}
  .opt{border:1.5px solid #d8e0ea;background:#fff;color:var(--navy);border-radius:999px;padding:10px 15px;font-size:15px;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit}
  .opt:hover{border-color:var(--pink);background:var(--pink-soft)}
  .inrow{display:flex;gap:8px}
  input{flex:1;border:1.5px solid #d8e0ea;border-radius:999px;padding:12px 16px;font-size:16px;font-family:inherit}
  input:focus{outline:none;border-color:var(--blue)}
  .send{background:var(--navy);color:#fff;border:none;border-radius:50%;width:46px;height:46px;font-size:18px;cursor:pointer;flex-shrink:0}
  .micro{font-size:11.5px;color:var(--muted);text-align:center;margin-top:9px}
  .cta{display:block;width:100%;text-align:center;background:var(--pink);color:#fff;border:none;border-radius:13px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div class="demo-flag">DEMO — built by Renzo for the Wolomi interview · not a live Wolomi page</div>
<div class="phone">
  <div class="top">
    <div class="av">M</div>
    <div><div class="nm">Maya · Mama Companion</div><div class="st">Online now</div></div>
  </div>
  <div class="prog" id="prog">
    <div class="pdot on"></div><div class="pdot"></div><div class="pdot"></div><div class="pdot"></div>
  </div>
  <div style="display:flex;align-items:center;justify-content:center;gap:14px;padding:7px 16px 3px">
    <span style="color:#D4537E;letter-spacing:1px;font-size:11px">★★★★★</span>
    <span style="display:flex;align-items:center;gap:13px;filter:grayscale(1);opacity:.7">
      <span style="font-family:Georgia,serif;font-weight:700;font-size:15px;color:#3a4654">Forbes</span>
      <span style="font-family:Arial,sans-serif;font-weight:800;font-size:12px;letter-spacing:2px;color:#3a4654">ESSENCE</span>
      <span style="font-family:'Didot',Georgia,serif;font-weight:600;font-size:15px;color:#3a4654">Glamour</span>
    </span>
  </div>
  <div class="chat" id="chat"></div>
  <div class="tray" id="tray"></div>
</div>

<script>
var chat=document.getElementById('chat'),tray=document.getElementById('tray'),prog=document.getElementById('prog');
var data={},stepIdx=0;
var flow=[
 {bot:"Hey mama 💛 I'm Maya. I help moms in San Diego & Imperial County get free maternal support. Mind if I ask a few quick questions to check what you qualify for?",
  opts:["Yes, let's go!","Tell me more first"],field:"intro"},
 {bot:"Love it. First — which county are you in?",opts:["San Diego","Imperial","Somewhere else"],field:"county"},
 {bot:"Got it. And where are you in your journey right now?",opts:["I'm pregnant","Just had a baby","Trying / planning"],field:"stage"},
 {bot:"Thank you for sharing. Do you have Medi-Cal? Totally okay if you're not sure.",opts:["Yes","Not sure","No / other"],field:"medical"},
 {bot:"You're a great fit so far! 🎉 What's your first name and the best number to reach you? A real person (me!) will follow up — no spam.",input:true,field:"contact"}
];

function scroll(){chat.scrollTop=chat.scrollHeight}
function botMsg(text,cb){
  var t=document.createElement('div');t.className='row typing';
  t.innerHTML='<div class="bav">M</div><div class="bub"><span></span><span></span><span></span></div>';
  chat.appendChild(t);scroll();
  setTimeout(function(){
    t.remove();
    var r=document.createElement('div');r.className='row';
    r.innerHTML='<div class="bav">M</div><div class="bub"></div>';
    r.querySelector('.bub').textContent=text;chat.appendChild(r);scroll();
    if(cb)cb();
  },750);
}
function meMsg(text){
  var r=document.createElement('div');r.className='row me';
  r.innerHTML='<div class="bub"></div>';r.querySelector('.bub').textContent=text;
  chat.appendChild(r);scroll();
}
function setProg(i){prog.querySelectorAll('.pdot').forEach(function(d,n){d.classList.toggle('on',n<=i)})}

function ask(i){
  var step=flow[i];
  setProg(Math.min(i,3));
  botMsg(step.bot,function(){
    tray.innerHTML='';
    if(step.input){
      var box=document.createElement('div');
      box.innerHTML='<div class="inrow"><input id="nm" placeholder="First name"></div>'+
                    '<div class="inrow" style="margin-top:8px"><input id="ph" type="tel" placeholder="Phone number"><button class="send" id="sb">→</button></div>'+
                    '<div class="micro">🔒 Private & HIPAA-conscious · We never sell your info</div>';
      tray.appendChild(box);
      document.getElementById('sb').onclick=function(){
        var nm=document.getElementById('nm').value.trim(),ph=document.getElementById('ph').value.trim();
        if(!nm||!ph)return;
        meMsg(nm+' · '+ph);data.contact=nm;tray.innerHTML='';finish();
      };
    }else{
      step.opts.forEach(function(o){
        var b=document.createElement('button');b.className='opt';b.textContent=o;
        b.onclick=function(){
          meMsg(o);data[step.field]=o;tray.innerHTML='';
          if(step.field==='intro'&&o==='Tell me more first'){
            botMsg("Of course! Wolomi gives eligible moms a personal Mama Companion, a midwife, lactation help, mental-health support, and a community — all free, in partnership with VOA Southwest. Ready?",function(){
              tray.innerHTML='';var go=document.createElement('button');go.className='opt';go.textContent="Okay, I'm ready!";
              go.onclick=function(){meMsg("Okay, I'm ready!");tray.innerHTML='';stepIdx=1;ask(1)};tray.appendChild(go);
            });return;
          }
          stepIdx=i+1;ask(stepIdx);
        };
        tray.appendChild(b);
      });
    }
  });
}
function finish(){
  setProg(3);
  botMsg("Amazing — based on your answers, you very likely qualify for free support! 🎉",function(){
    botMsg("I'll personally reach out within 1 business day to confirm your benefits and match you with your support team. You've got this, mama 💛",function(){
      var done=document.createElement('button');done.className='cta';done.textContent='Done — I’ll look out for your message';
      done.onclick=function(){done.textContent='See you soon 💛';done.disabled=true};
      tray.appendChild(done);
      var m=document.createElement('div');m.className='micro';m.textContent='Demo only — your responses are not stored.';tray.appendChild(m);
    });
  });
}
ask(0);
</script>
</body>
</html>
